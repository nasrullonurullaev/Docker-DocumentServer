name: Docker Test Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build:
          - BASE_VERSION: 24.04
            PG_VERSION: 16
            PACKAGE_SUFFIX: t64
            TAG: 24
          - BASE_VERSION: 22.04
            PG_VERSION: 14
            PACKAGE_SUFFIX: ""
            TAG: 22
          - BASE_VERSION: 20.04
            PG_VERSION: 12
            PACKAGE_SUFFIX: ""
            TAG: 20           

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -f Dockerfile . -t ds:${{ matrix.build.TAG }} \
            --build-arg PG_VERSION=${{ matrix.build.PG_VERSION }} \
            --build-arg BASE_VERSION=${{ matrix.build.BASE_VERSION }} \
            --build-arg PACKAGE_SUFFIX=${{ matrix.build.PACKAGE_SUFFIX }}
